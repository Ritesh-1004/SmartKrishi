{% extends "base.html" %}
{% block title %}500 - Server Error{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="text-center">
        <div class="display-1 fw-bold text-danger">500</div>
        <h2 class="mb-3">Something Went Wrong</h2>
        <p class="text-muted mb-4">Our servers encountered an error. Please try again.</p>
        <a href="{{ url_for('main.index') }}" class="btn btn-success">
            <i class="bi bi-house me-2"></i>Go Home
        </a>
    </div>
</div>
{% endblock %}
