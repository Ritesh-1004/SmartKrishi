version: "3.9"

services:
  # ─── SmartKrishi App ────────────────────────────────────────────────────────
  smartkrishi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartkrishi_app
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://smartkrishi:smartkrishi_pass@db:5432/smartkrishi
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_PERSIST_DIR=/app/data/vector_store
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    restart: unless-stopped
    networks:
      - smartkrishi_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: smartkrishi_db
    environment:
      POSTGRES_DB: smartkrishi
      POSTGRES_USER: smartkrishi
      POSTGRES_PASSWORD: smartkrishi_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - smartkrishi_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartkrishi"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartkrishi_redis
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-smartkrishi_redis}"
    volumes:
      - redis_data:/data
    networks:
      - smartkrishi_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: smartkrishi_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - smartkrishi
    networks:
      - smartkrishi_net
    restart: unless-stopped

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  pg_data:
  redis_data:
  app_data:
  app_logs:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  smartkrishi_net:
    driver: bridge
